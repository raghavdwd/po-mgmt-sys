<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendors - PO Management</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="brand"><i class="bi bi-box-seam-fill"></i> PO Manager</div>
        <ul class="sidebar-nav">
            <li><a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/create-po.html"><i class="bi bi-plus-circle"></i> Create PO</a></li>
            <li><a href="/vendors.html" class="active"><i class="bi bi-building"></i> Vendors</a></li>
            <li><a href="/products.html"><i class="bi bi-box"></i> Products</a></li>
        </ul>
        <div class="sidebar-user" id="sidebar-user"></div>
    </nav>

    <div class="main-content">
        <div id="alert-container"></div>
        <div class="top-bar">
            <h1>Vendors</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#vendorModal" onclick="resetVendorForm()">
                <i class="bi bi-plus-lg me-1"></i> Add Vendor
            </button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Rating</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vendors-tbody">
                            <tr><td colspan="5" class="text-center py-4 text-muted">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="vendorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="vendor-modal-title">Add Vendor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="vendor-form">
                    <div class="modal-body">
                        <input type="hidden" id="vendor-id">
                        <div class="mb-3">
                            <label class="form-label">Name *</label>
                            <input type="text" class="form-control" id="vendor-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" id="vendor-email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" id="vendor-phone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" id="vendor-address">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rating (0-5)</label>
                            <input type="number" class="form-control" id="vendor-rating" min="0" max="5" step="0.5" value="0">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="vendor-submit-btn">Save Vendor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/vendors.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - PO Management</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="brand"><i class="bi bi-box-seam-fill"></i> PO Manager</div>
        <ul class="sidebar-nav">
            <li><a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/create-po.html"><i class="bi bi-plus-circle"></i> Create PO</a></li>
            <li><a href="/vendors.html"><i class="bi bi-building"></i> Vendors</a></li>
            <li><a href="/products.html" class="active"><i class="bi bi-box"></i> Products</a></li>
        </ul>
        <div class="sidebar-user" id="sidebar-user"></div>
    </nav>

    <div class="main-content">
        <div id="alert-container"></div>
        <div class="top-bar">
            <h1>Products</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="resetProductForm()">
                <i class="bi bi-plus-lg me-1"></i> Add Product
            </button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>SKU</th>
                                <th>Category</th>
                                <th>Unit Price</th>
                                <th>Stock</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody">
                            <tr><td colspan="7" class="text-center py-4 text-muted">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="product-modal-title">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="product-form">
                    <div class="modal-body">
                        <input type="hidden" id="product-id">
                        <div class="mb-3">
                            <label class="form-label">Name *</label>
                            <input type="text" class="form-control" id="product-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">SKU *</label>
                            <input type="text" class="form-control" id="product-sku" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" class="form-control" id="product-category">
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Unit Price *</label>
                                <input type="number" class="form-control" id="product-price" min="0.01" step="0.01" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Stock Level</label>
                                <input type="number" class="form-control" id="product-stock" min="0" value="0">
                            </div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="product-description" rows="3" placeholder="Enter product description or use AI..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
</body>
</html>

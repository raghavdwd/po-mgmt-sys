<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PO Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="brand"><i class="bi bi-box-seam-fill"></i> PO Manager</div>
        <ul class="sidebar-nav">
            <li><a href="/" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/create-po.html"><i class="bi bi-plus-circle"></i> Create PO</a></li>
            <li><a href="/vendors.html"><i class="bi bi-building"></i> Vendors</a></li>
            <li><a href="/products.html"><i class="bi bi-box"></i> Products</a></li>
        </ul>
        <div class="sidebar-user" id="sidebar-user"></div>
    </nav>

    <div class="main-content">
        <div id="alert-container"></div>
        <div class="top-bar">
            <h1>Dashboard</h1>
            <a href="/create-po.html" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i> New Purchase Order</a>
        </div>

        <div class="row g-3 mb-4" id="stats-row">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#eff6ff;color:#2563eb;"><i class="bi bi-file-earmark-text"></i></div>
                    <div><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total POs</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#fef3c7;color:#d97706;"><i class="bi bi-hourglass-split"></i></div>
                    <div><div class="stat-value" id="stat-pending">-</div><div class="stat-label">Pending</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#d1fae5;color:#059669;"><i class="bi bi-check-circle"></i></div>
                    <div><div class="stat-value" id="stat-approved">-</div><div class="stat-label">Approved</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#ede9fe;color:#7c3aed;"><i class="bi bi-currency-rupee"></i></div>
                    <div><div class="stat-value" id="stat-value">-</div><div class="stat-label">Total Value</div></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Purchase Orders</span>
                <select class="form-select form-select-sm" style="width:auto;" id="status-filter">
                    <option value="">All Statuses</option>
                    <option value="draft">Draft</option>
                    <option value="submitted">Submitted</option>
                    <option value="approved">Approved</option>
                    <option value="received">Received</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Reference</th>
                                <th>Vendor</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="po-table-body">
                            <tr><td colspan="7" class="text-center py-4 text-muted">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="poDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-po-ref">Purchase Order</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-po-body"></div>
                <div class="modal-footer" id="modal-po-footer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PO Management System</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card">
        <div style="font-size:2.5rem; margin-bottom:1rem;">📦</div>
        <h1>PO Management System</h1>
        <p>IV Innovations Private Limited</p>
        <button class="google-btn" id="google-login-btn">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Sign in with Google
        </button>
        <div class="mt-4">
            <button class="btn btn-outline-secondary btn-sm" id="demo-login-btn">Demo Login (No Google)</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('google-login-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const width = 500;
            const height = 600;
            const left = (window.innerWidth / 2) - (width / 2);
            const top = (window.innerHeight / 2) - (height / 2);
            window.open(API_BASE + '/auth/login/google', 'GoogleLogin', `width=${width},height=${height},top=${top},left=${left}`);
        });

        document.getElementById('demo-login-btn').addEventListener('click', async () => {
            try {
                const resp = await fetch(API_BASE + '/auth/demo-login', { method: 'POST' });
                if (!resp.ok) throw new Error('Demo login failed');
                const data = await resp.json();
                Auth.setSession(data.access_token, data.user);
                window.location.href = '/';
            } catch (e) {
                alert('Demo login failed: ' + e.message);
            }
        });

        if (Auth.isLoggedIn()) {
            window.location.href = '/';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Purchase Order - PO Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="brand"><i class="bi bi-box-seam-fill"></i> PO Manager</div>
        <ul class="sidebar-nav">
            <li><a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="/create-po.html" class="active"><i class="bi bi-plus-circle"></i> Create PO</a></li>
            <li><a href="/vendors.html"><i class="bi bi-building"></i> Vendors</a></li>
            <li><a href="/products.html"><i class="bi bi-box"></i> Products</a></li>
        </ul>
        <div class="sidebar-user" id="sidebar-user"></div>
    </nav>

    <div class="main-content">
        <div id="alert-container"></div>
        <div class="top-bar">
            <h1>Create Purchase Order</h1>
            <a href="/" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> Back</a>
        </div>

        <form id="po-form" novalidate>
            <div class="card mb-4">
                <div class="card-header">Order Details</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="vendor-select" class="form-label">Vendor *</label>
                            <select class="form-select" id="vendor-select" required>
                                <option value="">Select a vendor...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="po-notes" class="form-label">Notes</label>
                            <input type="text" class="form-control" id="po-notes" placeholder="Optional notes...">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Order Items</span>
                    <button type="button" class="btn btn-primary btn-sm" id="add-row-btn">
                        <i class="bi bi-plus-lg me-1"></i> Add Product
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 po-items-table">
                            <thead>
                                <tr>
                                    <th style="min-width:250px;">Product</th>
                                    <th style="width:100px;">Qty</th>
                                    <th style="width:140px;">Unit Price</th>
                                    <th style="width:140px;">Line Total</th>
                                    <th style="width:60px;"></th>
                                </tr>
                            </thead>
                            <tbody id="items-tbody">
                                <tr id="empty-row">
                                    <td colspan="5" class="text-center py-4 text-muted">
                                        Click "Add Product" to add items to this order
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="row justify-content-end mb-4">
                <div class="col-md-4">
                    <div class="totals-box">
                        <div class="row">
                            <div class="col-6 text-end">Subtotal:</div>
                            <div class="col-6 text-end" id="display-subtotal">₹0.00</div>
                        </div>
                        <div class="row">
                            <div class="col-6 text-end">Tax (5%):</div>
                            <div class="col-6 text-end" id="display-tax">₹0.00</div>
                        </div>
                        <div class="row total-row">
                            <div class="col-6 text-end">Total:</div>
                            <div class="col-6 text-end" id="display-total">₹0.00</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="/" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" id="submit-btn" disabled>
                    <i class="bi bi-check-lg me-1"></i> Submit Purchase Order
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/create-po.js"></script>
</body>
</html>
